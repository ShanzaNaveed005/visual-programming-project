<!DOCTYPE html>
<html>
<head>
    <title>Test Unsplash Images</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .card {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 10px;
            width: 300px;
        }

        img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <h1>Testing Unsplash API - Pakistan Cities</h1>
    <div class="container">
        <div class="card">
            <img src="https://source.unsplash.com/featured/400x300/?Hunza,travel" alt="Hunza">
            <h3>Hunza Valley</h3>
        </div>
        <div class="card">
            <img src="https://source.unsplash.com/featured/400x300/?Murree,hillstation" alt="Murree">
            <h3>Murree</h3>
        </div>
        <div class="card">
            <img src="https://source.unsplash.com/featured/400x300/?Skardu,mountain" alt="Skardu">
            <h3>Skardu</h3>
        </div>
        <div class="card">
            <img src="https://source.unsplash.com/featured/400x300/?Lahore,historical" alt="Lahore">
            <h3>Lahore</h3>
        </div>
        <div class="card">
            <img src="https://source.unsplash.com/featured/400x300/?Karachi,coast" alt="Karachi">
            <h3>Karachi</h3>
        </div>
        <div class="card">
            <img src="https://source.unsplash.com/featured/400x300/?Islamabad,capital" alt="Islamabad">
            <h3>Islamabad</h3>
        </div>
    </div>
</body>
</html>
